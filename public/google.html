<!DOCTYPE html>
<html>
<head>
  <title>Google Proxy</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #111;
      color: white;
    }

    input {
      width: 60%;
      padding: 10px;
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }

    iframe {
      width: 90%;
      height: 80vh;
      margin-top: 20px;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<h1>🌐 Proxy Browser</h1>

<input id="url" placeholder="Enter URL (https://example.com)">
<button onclick="loadSite()">Go</button>

<iframe id="frame"></iframe>

<script>
function loadSite() {
  let url = document.getElementById("url").value;

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  document.getElementById("frame").src =
    "/proxy?url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
