<!DOCTYPE html>
<html>
<head>
  <title>Mini Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    #bar {
      display: flex;
      padding: 10px;
      background: #222;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: 90vh;
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div id="bar">
  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
</div>

<iframe id="frame"></iframe>

<script>
function go() {
  let url = document.getElementById("url").value;

  if (!url.startsWith("http")) {
    url = "https://www.google.com/search?q=" + encodeURIComponent(url);
  }

  document.getElementById("frame").src =
    "/proxy?url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
