<!DOCTYPE html>
<html>
<head>
  <title>small_guys_proxie</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    #top {
      display: flex;
      padding: 10px;
      background: #1c1c1c;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 6px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 60px);
      border: none;
      background: white;
    }
  </style>
</head>

<body>

<div id="top">
  <input id="url" placeholder="Search or enter URL">
  <button onclick="go()">Go</button>
  <button onclick="back()">←</button>
  <button onclick="forward()">→</button>
</div>

<iframe id="frame"></iframe>

<script>
let history = [];
let index = -1;

function normalize(url) {
  if (!url.startsWith("http")) return "https://" + url;
  return url;
}

function go() {
  const url = normalize(document.getElementById("url").value);
  const proxy = "/proxy?url=" + encodeURIComponent(url);

  document.getElementById("frame").src = proxy;

  history = history.slice(0, index + 1);
  history.push(proxy);
  index++;
}

function back() {
  if (index > 0) {
    index--;
    document.getElementById("frame").src = history[index];
  }
}

function forward() {
  if (index < history.length - 1) {
    index++;
    document.getElementById("frame").src = history[index];
  }
}
</script>

</body>
</html>
