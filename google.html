<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Proxy</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      text-align: center;
      background: #f1f3f4;
    }

    input {
      width: 80%;
      padding: 15px;
      font-size: 16px;
      margin: 10px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      background: #4285f4;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    #content {
      margin-top: 20px;
      text-align: left;
      background: white;
      padding: 15px;
      min-height: 400px;
      border: 1px solid #ddd;
      overflow: auto;
    }
  </style>
</head>
<body>

  <h1>🌐 Simple Proxy</h1>

  <input id="url" placeholder="Enter URL (https://...)" value="https://www.google.com">
  <br>
  <button onclick="load()">Load</button>

  <div id="content"></div>

  <script>
    async function load() {
      const url = document.getElementById("url").value;
      const box = document.getElementById("content");

      box.innerHTML = "Loading...";

      try {
        const res = await fetch("/proxy?url=" + encodeURIComponent(url));
        const text = await res.text();
        box.innerHTML = text;
      } catch (e) {
        box.innerHTML = "Error: " + e.message;
      }
    }
  </script>

</body>
</html>
